<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<title>Doguito</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h1>🐶 Doguito PetShop</h1>
<p>Sistema de gerenciamento do PetShop</p>
</header>


<!-- CARROSSEL -->

<section class="carousel">

<div class="slides">

<div class="slide">
<img src="https://images.unsplash.com/photo-1548199973-03cce0bbc87b">
<h2>Cuidando do seu melhor amigo</h2>
</div>

<div class="slide">
<img src="https://images.unsplash.com/photo-1517849845537-4d257902454a">
<h2>Banho, tosa e muito carinho</h2>
</div>

<div class="slide">
<img src="https://images.unsplash.com/photo-1601758228041-f3b2795255f1">
<h2>Produtos especiais para pets</h2>
</div>

</div>

<button class="prev" onclick="prevSlide()">❮</button>
<button class="next" onclick="nextSlide()">❯</button>

</section>



<!-- CARDS -->

<section class="cards">

<div class="card">

<img src="https://cdn-icons-png.flaticon.com/512/1946/1946429.png">

<h3>Clientes</h3>

<div class="form">

<input id="clienteNome" placeholder="Nome">
<input id="clienteEmail" placeholder="Email">

<div class="vip">
<input type="checkbox" id="clienteVip">
<label for="clienteVip">Cliente VIP</label>
</div>

<button onclick="criarCliente()">Cadastrar</button>

</div>

<ul id="listaClientes"></ul>

</div>



<div class="card">

<img src="https://cdn-icons-png.flaticon.com/512/616/616408.png">

<h3>Pets</h3>

<div class="form">

<input id="petNome" placeholder="Nome">
<input id="petTipo" placeholder="Tipo">
<input id="petIdade" placeholder="Idade">

<button onclick="cadastrarPet()">Cadastrar Pet</button>

</div>

<ul id="listaPets"></ul>

</div>



<div class="card">

<img src="https://cdn-icons-png.flaticon.com/512/1764/1764241.png">
<h3>Produtos</h3>

<div class="form">

<input id="produtoNome" placeholder="Produto">
<input id="produtoPreco" placeholder="Preço">

<button onclick="criarProduto()">Criar Produto</button>

</div>

<ul id="listaProdutos"></ul>

</div>



<div class="card">

<img src="https://cdn-icons-png.flaticon.com/512/263/263142.png">

<h3>Carrinho</h3>

<div class="form">

<select id="produtoSelect"></select>

<button onclick="adicionarCarrinho()">Adicionar</button>
<button onclick="removerCarrinho()">Remover</button>
<button onclick="finalizarCompra()">Finalizar</button>

</div>

<h3 class="total">Total: R$ <span id="total">0</span></h3>

<ul id="listaCarrinho"></ul>

</div>

</section>



<footer>
<p>Sistema PetShop para prática de Testes de Software</p>
</footer>



<!-- SCRIPT PRINCIPAL -->
<script src="app.js"></script>

<!-- TESTES -->
<script src="testes.js/testedecliente.js"></script>
<script src="testes.js/testedepet.js"></script>
<script src="testes.js/testedeprodutos.js"></script>
<script src="testes.js/testedecarrinho.js"></script>
<script src="testes.js/testetotal.js"></script>
<script src="testes.js/testefinalizacao.js"></script>
<script src="testes.js/testecarrossel.js"></script>

</body>
</html>
